[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Generate config.toml from env vars, then run the REST API server
# (uvicorn -> app.asgi:app). The orchestrator drives MPT via /api/v1/*.
startCommand = "python railway_entrypoint.py && python main.py"
# FastAPI's /docs always returns 200 once the server is up. MPT does NOT
# mount /ping, and / is static files with no guaranteed index.
healthcheckPath = "/docs"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# To speed up builds, set these as Railway service VARIABLES (not here —
# Railway ignores [build.args] in railway.toml and exposes service vars as
# Docker ARGs instead):
#   DOCKER_BUILD_MIRROR=default
#   PIP_USE_OFFICIAL=1
